<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undercover - Édition Zorgor</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f97316">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text: #f8fafc;
            --text-muted: #cbd5e1;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, #312e81, transparent 40%),
                              radial-gradient(circle at bottom left, #4c1d95, transparent 40%);
            background-attachment: fixed;
        }

        #app {
            width: 100%;
            max-width: 500px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1, .title-main {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(167, 139, 250, 0.3);
        }
        .subtitle { font-size: 1.2rem; display: block; font-weight: 600; color: #cbd5e1; -webkit-text-fill-color: #cbd5e1; background: none; text-shadow: none; }

        .card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 0.75rem;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            margin-bottom: 1rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="app">
        <h1 class="title-main">UNDERCOVER<br><span class="subtitle">Édition Zorgor</span></h1>
        <div class="card">
            <button onclick="window.location.href='/online'">🌍 Mode En Ligne (Multijoueur)</button>
            <button style="background:#15803d; box-shadow: 0 4px 15px rgba(21, 128, 61, 0.4);" onclick="window.location.href='/static/hotseat.html'">📱 Mode Hors-Ligne (Hot-seat)</button>
        </div>
    </div>

    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('Service Worker enregistré', reg.scope);
                }).catch(err => {
                    console.log('Erreur Service Worker:', err);
                });
            });
        }
    </script>
</body>
</html>
